name: Doonsec DingTalk Push

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Run slot: morning, afternoon, or auto"
        required: false
        default: "auto"
      dry_run:
        description: "Run without pushing to DingTalk"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: doonsec-dingtalk-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run RSS push
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          RSS_URL: ${{ vars.RSS_URL }}
          STATE_FILE: data/sent_state.json
          TRIGGER_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          SLOT="${{ github.event.inputs.slot || 'auto' }}"
          DRY_RUN=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            DRY_RUN="--dry-run"
          fi
          python -m doonsec_push --slot "$SLOT" $DRY_RUN

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- data/sent_state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_state.json
          git commit -m "chore: update RSS push state"
          git push
